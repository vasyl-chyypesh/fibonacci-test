<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fibonacci Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/theme.js" defer></script>
    <script src="scripts/fibonacciPage.js" defer></script>
    <script src="scripts/copy.js" defer></script>
</head>

<body>
    <div class="page">
        <header class="topbar">
            <span class="brand"><span class="brand-dot"></span> <strong>Fibonacci</strong> · REST API</span>
            <div class="theme-toggle-row" id="theme-toggle-slot"></div>
        </header>

        <a class="back-link" href="index.html">Back to docs homepage</a>

        <div class="doc" id="root">
            <h2>Fibonacci Calculator</h2>
            <p>Submit a number to the current API and wait for the computed Fibonacci value.</p>
        </div>

        <form id="fibonacci-form" class="fibonacci-form">
            <label for="number-input">Number</label>
            <div class="input-with-loader">
                <input id="number-input" name="number" type="number" min="1" step="1" placeholder="e.g. 7" required />
                <span id="checking-loader" class="checking-loader" aria-hidden="true" hidden></span>
                <span class="visually-hidden" id="checking-status">Checking result</span>
            </div>
            <button id="submit-button" type="submit">Calculate</button>
        </form>

        <output id="status-message" class="status-message" aria-live="polite"></output>
        <p id="error-message" class="error-message" role="alert" aria-live="assertive"></p>

        <div id="result-panel" class="result-panel" hidden>
            <h3>Result</h3>
            <div class="result-body">
                <div class="result-row">
                    <span class="result-key">Ticket</span>
                    <span class="result-value" id="result-ticket"></span>
                </div>
                <div class="result-row">
                    <span class="result-key">Input</span>
                    <span class="result-value" id="result-input"></span>
                </div>
                <p class="io-note">Fibonacci</p>
                <pre id="result-fibonacci" class="result-fibonacci"></pre>
            </div>
        </div>
    </div>
</body>

</html>
