<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fibonacci API Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding: 0;
        }

        .api-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-13);
            padding: var(--space-13) var(--space-21);
            border-bottom: 1px solid var(--hairline);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .api-topbar .brand-group {
            display: inline-flex;
            align-items: center;
            gap: var(--space-21);
        }

        #redoc-container {
            background: var(--surface);
        }
    </style>
    <script src="scripts/theme.js" defer></script>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js" defer></script>
    <script src="scripts/apiDocsPage.js" defer></script>
</head>

<body>
    <header class="api-topbar">
        <span class="brand-group">
            <span class="brand"><span class="brand-dot"></span> <strong>Fibonacci</strong> · REST API</span>
            <a class="back-link" href="index.html" style="margin: 0;">Back to docs</a>
        </span>
        <div class="theme-toggle-row" id="theme-toggle-slot"></div>
    </header>

    <div id="redoc-container"></div>
</body>

</html>
